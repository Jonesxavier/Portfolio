<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Logbook — Jones Xavier</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%277%27%20fill%3D%27%23d4542a%27%2F%3E%3Ctext%20x%3D%2716%27%20y%3D%2722%27%20font-family%3D%27Arial%2CHelvetica%2Csans-serif%27%20font-size%3D%2716%27%20font-weight%3D%27700%27%20fill%3D%27%23fffdf8%27%20text-anchor%3D%27middle%27%3EJX%3C%2Ftext%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f2ec;--surface:#fffdf8;--ink:#17150f;--muted:#766f5f;--line:#e3ded2;--accent:#d4542a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{overflow-x:hidden;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,Arial,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  body::before{content:"";position:fixed;inset:0;border:7px solid #15120d;pointer-events:none;z-index:200;}
  #globeViz{position:fixed;inset:0;z-index:0;transform:translateY(15vh);will-change:transform;}
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:flex-end;padding:18px 30px;z-index:7;pointer-events:none;}
  .back{font-family:'JetBrains Mono';font-size:13px;color:var(--muted);text-decoration:none;border:1px solid var(--line);background:var(--bg);border-radius:999px;padding:7px 14px;pointer-events:auto;}
  .back:hover{color:var(--accent);border-color:var(--accent);}
  .htext{position:fixed;left:30px;top:84px;max-width:30ch;z-index:7;pointer-events:none;}
  .eyebrow{font-family:'JetBrains Mono';font-size:13px;color:var(--accent);}
  h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,5vw,52px);letter-spacing:-1px;margin:6px 0 0;}
  .lead{color:var(--muted);font-size:15px;margin-top:12px;}
  .places{position:fixed;left:0;right:0;bottom:40px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 30px;z-index:7;}
  .chip{font-family:'JetBrains Mono';font-size:12px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;transition:.15s;}
  .chip:hover{border-color:var(--accent);color:var(--accent);}
  .ginfo{position:fixed;left:0;right:0;bottom:16px;text-align:center;font-family:'JetBrains Mono';font-size:11px;color:var(--muted);z-index:7;}
  .spacer{height:170vh;}
  .ptip{text-align:center;transform:translateY(-8px);pointer-events:none;}
  .ptip img{display:block;width:128px;height:84px;object-fit:cover;border-radius:9px;border:1px solid #15120d;box-shadow:0 10px 26px rgba(0,0,0,.3);margin:0 auto 6px;}
  .ptip .ptname{font-family:'JetBrains Mono';font-size:12px;font-weight:500;color:#fff;background:#15120d;display:inline-block;padding:3px 10px;border-radius:999px;}
</style>
</head>
<body>
<div id="globeViz"></div>
<div class="topbar">
  <a class="back" href="index.html">&#8592; back home</a>
</div>
<div class="htext">
  <div class="eyebrow">// logbook</div>
  <h1>Places I want to go</h1>
  <p class="lead">A globe of where I'm headed — drag to spin it, and follow the line as it hops from one to the next.</p>
</div>
<div class="places" id="chips"></div>
<div class="ginfo">drag to rotate &middot; scroll to lift &middot; hover a pin</div>
<div class="spacer"></div>

<script src="https://unpkg.com/globe.gl"></script>
<script>
 var places=[
  {name:'Switzerland',slug:'switzerland',lat:46.8,lng:8.23},{name:'London',slug:'london',lat:51.51,lng:-0.13},
  {name:'New York',slug:'new-york',lat:40.71,lng:-74.01},{name:'Texas',slug:'texas',lat:30.27,lng:-97.74},
  {name:'Hawaii',slug:'hawaii',lat:21.31,lng:-157.86},{name:'Brazil',slug:'brazil',lat:-22.91,lng:-43.17},
  {name:'Cape Town',slug:'cape-town',lat:-33.92,lng:18.42},{name:'Japan',slug:'japan',lat:35.68,lng:139.69},
  {name:'Great Wall of China',slug:'great-wall',lat:40.43,lng:116.57}
 ];
 var ch=document.getElementById('chips');
 places.forEach(function(p,i){var s=document.createElement('span');s.className='chip';s.textContent=p.name;s.setAttribute('data-i',i);ch.appendChild(s);});
 // one arc per hop around the loop; a single lit pulse travels them in sequence
 var arcs=[];
 for(var i=0;i<places.length;i++){var a=places[i],b=places[(i+1)%places.length];arcs.push({startLat:a.lat,startLng:a.lng,endLat:b.lat,endLng:b.lng,idx:i});}
 var CYCLE=2.7, N=arcs.length;

 function init(){
   if(typeof Globe==='undefined'){setTimeout(init,200);return;}
   var el=document.getElementById('globeViz');
   var world=Globe()(el)
     .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
     .backgroundColor('rgba(0,0,0,0)')
     .showAtmosphere(true).atmosphereColor('#d4542a').atmosphereAltitude(0.16)
     .pointsData(places).pointLat('lat').pointLng('lng').pointColor(function(){return '#f08a4b';}).pointAltitude(0.015).pointRadius(0.5)
       .pointLabel(function(p){return '<div class="ptip"><img src="places/'+p.slug+'.jpg" onerror="this.remove()"><div class="ptname">'+p.name+'</div></div>';})
     .arcsData(arcs).arcColor(function(){return '#ff7a45';}).arcStroke(0.7).arcAltitudeAutoScale(0.4);
   world.controls().autoRotate=false; world.controls().enableZoom=false;
   world.pointOfView({lat:18,lng:-40,altitude:2.3});
   function size(){world.width(window.innerWidth).height(window.innerHeight);}
   size(); window.addEventListener('resize',size);
   function onScroll(){var y=window.scrollY||window.pageYOffset||0;var prog=Math.min(1,y/(window.innerHeight*1.1));el.style.transform='translateY('+(15-prog*23)+'vh)';}
   window.addEventListener('scroll',onScroll,{passive:true}); onScroll();
   // slow auto-tour: jump to a random place, drag or click a name anytime
   var tourT,last=-1;
   function flyTo(p,ms){world.pointOfView({lat:p.lat,lng:p.lng,altitude:1.7},ms);}
   function nextStop(){var i;do{i=Math.floor(Math.random()*places.length);}while(i===last&&places.length>1);last=i;flyTo(places[i],3000);tourT=setTimeout(nextStop,6500);}
   tourT=setTimeout(nextStop,1200);
   document.querySelectorAll('#chips .chip').forEach(function(s){s.addEventListener('click',function(){clearTimeout(tourT);var i=+s.getAttribute('data-i');last=i;flyTo(places[i],1500);tourT=setTimeout(nextStop,6500);});});
 }
 init();
</script>
</body>
</html>
