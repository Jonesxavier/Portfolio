<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Logbook — Jones Xavier</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f2ec;--surface:#fffdf8;--ink:#17150f;--muted:#766f5f;--line:#e3ded2;--accent:#d4542a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{overflow-x:hidden;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,Arial,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  body::before{content:"";position:fixed;inset:0;border:7px solid #15120d;pointer-events:none;z-index:200;}
  #globeViz{position:fixed;inset:0;z-index:0;transform:translateY(15vh);will-change:transform;}
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:flex-end;padding:18px 30px;z-index:7;pointer-events:none;}
  .back{font-family:'JetBrains Mono';font-size:13px;color:var(--muted);text-decoration:none;border:1px solid var(--line);background:var(--bg);border-radius:999px;padding:7px 14px;pointer-events:auto;}
  .back:hover{color:var(--accent);border-color:var(--accent);}
  .htext{position:fixed;left:30px;top:84px;max-width:30ch;z-index:7;pointer-events:none;}
  .eyebrow{font-family:'JetBrains Mono';font-size:13px;color:var(--accent);}
  h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,5vw,52px);letter-spacing:-1px;margin:6px 0 0;}
  .lead{color:var(--muted);font-size:15px;margin-top:12px;}
  .places{position:fixed;left:0;right:0;bottom:40px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 30px;z-index:7;}
  .chip{font-family:'JetBrains Mono';font-size:12px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 12px;}
  .ginfo{position:fixed;left:0;right:0;bottom:16px;text-align:center;font-family:'JetBrains Mono';font-size:11px;color:var(--muted);z-index:7;}
  .spacer{height:170vh;}
  .ptip{text-align:center;transform:translateY(-8px);pointer-events:none;}
  .ptip img{display:block;width:128px;height:84px;object-fit:cover;border-radius:9px;border:1px solid #15120d;box-shadow:0 10px 26px rgba(0,0,0,.28);margin:0 auto 6px;}
  .ptip .ptname{font-family:'JetBrains Mono';font-size:12px;font-weight:500;color:#15120d;background:var(--bg);display:inline-block;padding:3px 10px;border-radius:999px;border:1px solid var(--line);}
</style>
</head>
<body>
<div id="globeViz"></div>
<div class="topbar">
  <a class="back" href="index.html">&#8592; back home</a>
</div>
<div class="htext">
  <div class="eyebrow">// logbook</div>
  <h1>Places I want to go</h1>
  <p class="lead">A globe of where I'm headed — drag to spin it, scroll to lift it, follow the line.</p>
</div>
<div class="places" id="chips"></div>
<div class="ginfo">drag to rotate &middot; scroll to lift &middot; hover a dot</div>
<div class="spacer"></div>

<script src="lib/world.js"></script>
<script src="https://unpkg.com/globe.gl"></script>
<script>
 var places=[
  {name:'Switzerland',slug:'switzerland',lat:46.8,lng:8.23},{name:'London',slug:'london',lat:51.51,lng:-0.13},
  {name:'New York',slug:'new-york',lat:40.71,lng:-74.01},{name:'Texas',slug:'texas',lat:30.27,lng:-97.74},
  {name:'Hawaii',slug:'hawaii',lat:21.31,lng:-157.86},{name:'Brazil',slug:'brazil',lat:-22.91,lng:-43.17},
  {name:'Cape Town',slug:'cape-town',lat:-33.92,lng:18.42},{name:'Japan',slug:'japan',lat:35.68,lng:139.69},
  {name:'Great Wall of China',slug:'great-wall',lat:40.43,lng:116.57}
 ];
 var ch=document.getElementById('chips');
 places.forEach(function(p){var s=document.createElement('span');s.className='chip';s.textContent=p.name;ch.appendChild(s);});

 function gc(a,b,n){var R=Math.PI/180,D=180/Math.PI;var la1=a.lat*R,lo1=a.lng*R,la2=b.lat*R,lo2=b.lng*R;
   var x1=Math.cos(la1)*Math.cos(lo1),y1=Math.cos(la1)*Math.sin(lo1),z1=Math.sin(la1);
   var x2=Math.cos(la2)*Math.cos(lo2),y2=Math.cos(la2)*Math.sin(lo2),z2=Math.sin(la2);
   var dt=Math.max(-1,Math.min(1,x1*x2+y1*y2+z1*z2)),d=Math.acos(dt),out=[];if(d===0)return[[a.lat,a.lng]];
   for(var i=0;i<=n;i++){var t=i/n,s1=Math.sin((1-t)*d)/Math.sin(d),s2=Math.sin(t*d)/Math.sin(d);
     var x=s1*x1+s2*x2,y=s1*y1+s2*y2,z=s1*z1+s2*z2;out.push([Math.atan2(z,Math.sqrt(x*x+y*y))*D,Math.atan2(y,x)*D]);}return out;}
 var route=[];for(var i=0;i<places.length;i++){var seg=gc(places[i],places[(i+1)%places.length],26);if(i>0)seg=seg.slice(1);route=route.concat(seg);}
 var arcs=[];for(var k=0;k<places.length;k++){var A=places[k],B=places[(k+1)%places.length];arcs.push({startLat:A.lat,startLng:A.lng,endLat:B.lat,endLng:B.lng,idx:k});}
 var paths=[];
 for(var a2=-60;a2<=60;a2+=30){var ln=[];for(var o=-180;o<=180;o+=4)ln.push([a2,o]);paths.push({pts:ln,kind:'grid'});}
 for(var o2=-180;o2<180;o2+=30){var ln2=[];for(var a3=-80;a3<=80;a3+=4)ln2.push([a3,o2]);paths.push({pts:ln2,kind:'grid'});}
 

 function init(){
   if(typeof Globe==='undefined'){setTimeout(init,150);return;}
   var feats=(window.WORLD_GEO&&window.WORLD_GEO.features)?window.WORLD_GEO.features:[];
   var el=document.getElementById('globeViz');
   var world=Globe()(el)
     .backgroundColor('rgba(0,0,0,0)')
     .showGlobe(true).showAtmosphere(false)
     .polygonsData(feats).polygonAltitude(0.018)
       .polygonCapColor(function(){return '#30302e';}).polygonSideColor(function(){return 'rgba(70,70,67,0.5)';})
       .polygonStrokeColor(function(){return 'rgba(125,125,120,0.45)';}).polygonsTransitionDuration(0)
     .pathsData(paths).pathPoints(function(d){return d.pts;}).pathPointLat(function(p){return p[0];}).pathPointLng(function(p){return p[1];})
       .pathColor(function(d){return d.kind==='pulse'?'#ff7a45':d.kind==='base'?'rgba(212,84,42,0.32)':'rgba(120,111,95,0.16)';})
       .pathStroke(function(d){return d.kind==='pulse'?1.5:d.kind==='base'?0.8:0.4;})
       .pathDashLength(function(d){return d.kind==='pulse'?0.18:1;})
       .pathDashGap(function(d){return d.kind==='pulse'?0.82:0;})
       .pathDashAnimateTime(function(d){return d.kind==='pulse'?6000:0;})
       .pathAltitude(function(d){return d.kind==='grid'?0.002:0.03;})
       .pathTransitionDuration(0)
     .arcsData(arcs).arcColor(function(){return '#ff7a45';}).arcStroke(0.7).arcAltitudeAutoScale(0.5).arcDashLength(0.4).arcDashGap(0.6).arcDashInitialGap(function(d){return d.idx*0.25;}).arcDashAnimateTime(2600)
     .pointsData(places).pointLat('lat').pointLng('lng').pointColor(function(){return '#e8623a';}).pointAltitude(0.035).pointRadius(0.5)
       .pointLabel(function(p){return '<div class="ptip"><img src="places/'+p.slug+'.jpg" onerror="this.remove()"><div class="ptname">'+p.name+'</div></div>';});
   try{ world.globeMaterial().color.set('#efe9dd'); }catch(e){}
   world.controls().autoRotate=true; world.controls().autoRotateSpeed=0.5; world.controls().enableZoom=false;
   world.pointOfView({lat:18,lng:-40,altitude:2.3});
   function size(){world.width(window.innerWidth).height(window.innerHeight);}
   size(); window.addEventListener('resize',size);

   // sits a little low, rises as you scroll
   function onScroll(){var y=window.scrollY||window.pageYOffset||0;var prog=Math.min(1,y/(window.innerHeight*1.1));var off=15-prog*23;el.style.transform='translateY('+off+'vh)';}
   window.addEventListener('scroll',onScroll,{passive:true}); onScroll();
 }
 init();
</script>
</body>
</html>
